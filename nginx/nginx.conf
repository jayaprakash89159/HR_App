user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream worksphere_django {
        server django:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---- Port 80 — main app ----
    server {
        listen 80;
        server_name _;

        # Static files served directly from volume
        location /static/ {
            alias /app/staticfiles/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Media files
        location /media/ {
            alias /app/media/;
            expires 7d;
            access_log off;
        }

        # Health check
        location /health/ {
            proxy_pass http://worksphere_django;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Everything else → Django
        location / {
            proxy_pass         http://worksphere_django;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_redirect     off;
            proxy_connect_timeout  60s;
            proxy_read_timeout     120s;
            proxy_send_timeout     120s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;

            error_page 502 503 504 @starting;
        }

        location @starting {
            default_type text/html;
            add_header Content-Type "text/html; charset=utf-8";
            add_header Retry-After 15;
            return 503 '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="10"><title>Starting...</title><style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#F8FAFC;}div{text-align:center;padding:40px;background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);}h2{color:#1E40AF;margin-bottom:8px;}p{color:#6B7280;font-size:14px;}</style></head><body><div><h2>&#9881; WorkSphere HR is starting up...</h2><p>Please wait, auto-refreshing in 10 seconds...</p></div></body></html>';
        }
    }

    # ---- Port 8000 — direct access passthrough ----
    server {
        listen 8000;
        server_name _;

        location /static/ {
            alias /app/staticfiles/;
            expires 7d;
            access_log off;
        }

        location /media/ {
            alias /app/media/;
            access_log off;
        }

        location / {
            proxy_pass         http://worksphere_django;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_redirect     off;
            proxy_connect_timeout  60s;
            proxy_read_timeout     120s;
            proxy_send_timeout     120s;

            error_page 502 503 504 @starting8000;
        }

        location @starting8000 {
            default_type text/html;
            add_header Content-Type "text/html; charset=utf-8";
            return 503 '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="10"><title>Starting...</title><style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#F8FAFC;}div{text-align:center;padding:40px;background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);}h2{color:#1E40AF;margin-bottom:8px;}p{color:#6B7280;font-size:14px;}</style></head><body><div><h2>&#9881; WorkSphere HR is starting up...</h2><p>Please wait, auto-refreshing in 10 seconds...</p></div></body></html>';
        }
    }
}
