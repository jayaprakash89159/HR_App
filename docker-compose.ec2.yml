version: '3.9'

# ================================================================
# WorkSphere HR - EC2 Production Compose
# Use this file with: docker compose -f docker-compose.ec2.yml up -d
#
# DIFFERENCES from docker-compose.yml:
#   - Reads from .env file (update ALLOWED_HOSTS with your EC2 IP)
#   - Does NOT mount source code into container (avoids overriding installed packages)
#   - DB/Redis not exposed publicly (internal only)
# ================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: worksphere_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-worksphere_hr}
      POSTGRES_USER:     ${DB_USER:-worksphere}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worksphere123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-worksphere} -d ${DB_NAME:-worksphere_hr}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - worksphere_net

  redis:
    image: redis:7-alpine
    container_name: worksphere_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-worksphere123}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-worksphere123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - worksphere_net

  django:
    build:
      context: .
      dockerfile: Dockerfile
    image: worksphere_hr_app:latest
    container_name: worksphere_django
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: worksphere.settings
      DB_HOST: postgres
      DB_PORT: "5432"
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        python manage.py create_demo_data &&
        gunicorn worksphere.wsgi:application --config gunicorn.conf.py
      "
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worksphere_net

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    image: worksphere_hr_app:latest
    container_name: worksphere_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: worksphere.settings
      DB_HOST: postgres
      DB_PORT: "5432"
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python /app/scripts/wait_for_migrations.py &&
        celery -A worksphere worker -l info -c 2
      "
    volumes:
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worksphere_net

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: worksphere_hr_app:latest
    container_name: worksphere_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: worksphere.settings
      DB_HOST: postgres
      DB_PORT: "5432"
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python /app/scripts/wait_for_migrations.py &&
        celery -A worksphere beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
      "
    volumes:
      - celerybeat_data:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worksphere_net

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    image: worksphere_hr_app:latest
    container_name: worksphere_flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: worksphere.settings
      DB_HOST: postgres
      DB_PORT: "5432"
    command: >
      sh -c "
        python /app/scripts/wait_for_migrations.py &&
        celery -A worksphere flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower123}
      "
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - worksphere_net

  nginx:
    image: nginx:1.25-alpine
    container_name: worksphere_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - django
    networks:
      - worksphere_net

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
  nginx_logs:
  celerybeat_data:

networks:
  worksphere_net:
    driver: bridge
