name: worksphere_hr
description: WorkSphere HR - Enterprise HRMS Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.2.0

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.2
  table_calendar: ^3.0.9
  flutter_staggered_animations: ^1.1.1
  badges: ^3.1.2
  intl: ^0.19.0
  timeago: ^3.6.1

  # Camera & Location
  camera: ^0.10.5+9
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0

  # Biometrics
  local_auth: ^2.2.0

  # Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.15
  flutter_local_notifications: ^17.0.0

  # File handling
  file_picker: ^8.0.0+1
  open_file: ^3.3.2
  path_provider: ^2.1.2
  image_picker: ^1.0.7

  # Utils
  connectivity_plus: ^6.0.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
