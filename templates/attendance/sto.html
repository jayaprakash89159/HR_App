{% extends "base/base.html" %}
{% block title %}Short Time Off{% endblock %}
{% block page_title %}Short Time Off Request{% endblock %}
{% block page_subtitle %}Request permission to leave early or arrive late{% endblock %}
{% block content %}
<div class="max-w-lg bg-white rounded-xl shadow-sm border p-6">
    <h3 class="font-bold text-gray-900 mb-4">New Short Time Off</h3>
    <div class="space-y-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Date <span class="text-red-500">*</span></label><input type="date" id="stoDate" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">From Time</label><input type="time" id="stoFrom" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">To Time</label><input type="time" id="stoTo" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
        </div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
            <select id="stoType" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                <option value="late_arrival">Late Arrival</option>
                <option value="early_departure">Early Departure</option>
                <option value="extended_break">Extended Break</option>
            </select>
        </div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Reason <span class="text-red-500">*</span></label><textarea id="stoReason" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm resize-none" placeholder="Reason for short time off…"></textarea></div>
        <button onclick="submitSTO()" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 text-sm"><i class="fas fa-paper-plane mr-2"></i>Submit Request</button>
    </div>
</div>
<script>
const csrf = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('csrftoken='))?.split('=')[1]||'';
async function submitSTO() {
    const date = document.getElementById('stoDate').value;
    const from = document.getElementById('stoFrom').value;
    const to = document.getElementById('stoTo').value;
    const type = document.getElementById('stoType').value;
    const reason = document.getElementById('stoReason').value.trim();
    if (!date||!reason) { showToast('Please fill all required fields','warning'); return; }
    try {
        const r = await fetch('/api/v1/attendance/short-time-off/', {method:'POST', headers:{'X-CSRFToken':csrf,'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify({date,from_time:from,to_time:to,sto_type:type,reason})});
        const d = await r.json();
        if (r.ok) { showToast('Short time off request submitted!','success'); } else { showToast(d.error||'Failed','error'); }
    } catch(e) { showToast('Network error','error'); }
}
document.getElementById('stoDate').value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
