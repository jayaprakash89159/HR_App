{% extends "base/base.html" %}
{% block title %}On Duty Request{% endblock %}
{% block page_title %}On Duty (OD) Request{% endblock %}
{% block page_subtitle %}Apply for official duty outside office{% endblock %}
{% block content %}
<div class="max-w-lg space-y-5">
    <div class="bg-white rounded-xl shadow-sm border p-6">
        <h3 class="font-bold text-gray-900 mb-4">New OD Application</h3>
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">From Date <span class="text-red-500">*</span></label><input type="date" id="odFrom" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">To Date <span class="text-red-500">*</span></label><input type="date" id="odTo" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            </div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Destination / Client <span class="text-red-500">*</span></label><input type="text" id="odDest" placeholder="e.g. Client HQ, Bangalore" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Purpose <span class="text-red-500">*</span></label><textarea id="odPurpose" rows="3" placeholder="Describe the purpose of OD…" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm resize-none"></textarea></div>
            <button onclick="submitOD()" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 text-sm"><i class="fas fa-paper-plane mr-2"></i>Submit OD Request</button>
        </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
        <div class="px-4 py-3 bg-gray-50 border-b"><h3 class="font-semibold text-gray-800 text-sm">My OD History</h3></div>
        <div id="odHistory" class="px-4 py-8 text-center text-sm text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>Loading…</div>
    </div>
</div>
<script>
const csrf = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('csrftoken='))?.split('=')[1]||'';
async function submitOD() {
    const from = document.getElementById('odFrom').value;
    const to = document.getElementById('odTo').value;
    const dest = document.getElementById('odDest').value.trim();
    const purpose = document.getElementById('odPurpose').value.trim();
    if (!from||!to||!dest||!purpose) { showToast('Please fill all fields','warning'); return; }
    try {
        const r = await fetch('/api/v1/attendance/od-applications/', {method:'POST', headers:{'X-CSRFToken':csrf,'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify({from_date:from,to_date:to,destination:dest,purpose})});
        const d = await r.json();
        if (r.ok) { showToast('OD request submitted!','success'); loadHistory(); } else { showToast(d.error||'Failed','error'); }
    } catch(e) { showToast('Network error','error'); }
}
async function loadHistory() {
    const box = document.getElementById('odHistory');
    try {
        const r = await fetch('/api/v1/attendance/od-applications/', {credentials:'include'});
        const data = await r.json();
        const list = data.results||data;
        if (!list.length) { box.innerHTML='<p class="text-gray-400 text-sm">No OD applications found.</p>'; return; }
        const sc = {approved:'bg-green-100 text-green-700',pending:'bg-yellow-100 text-yellow-700',rejected:'bg-red-100 text-red-700'};
        box.innerHTML = list.map(od=>`<div class="py-3 border-b last:border-0 flex justify-between items-center"><div><p class="text-sm font-medium text-gray-900">${od.destination||'—'}</p><p class="text-xs text-gray-500">${od.from_date||''} → ${od.to_date||''}</p></div><span class="inline-flex px-2 py-0.5 text-xs font-semibold rounded-full ${sc[od.status]||'bg-gray-100 text-gray-600'}">${od.status}</span></div>`).join('');
    } catch(e) { box.innerHTML='<p class="text-sm text-gray-400">History not available.</p>'; }
}
loadHistory();
</script>
{% endblock %}
